services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    restart: unless-stopped
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_HOST: ${DB_HOST:?DB_HOST is required}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required}
      CLOAKD_API_URL: ${CLOAKD_API_URL:-}
      CLOAKD_PAYMENT_PATH: ${CLOAKD_PAYMENT_PATH:-/payment}
      CLOAKD_API_KEY: ${CLOAKD_API_KEY:-}
      CLOAKD_WEBHOOK_SECRET: ${CLOAKD_WEBHOOK_SECRET:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  slotopol:
    image: schwarzlichtbezirk/slotopol:latest
    restart: unless-stopped
    ports:
      - "${SLOTOPOL_PORT:-8080}:8080"

  slot-api:
    build:
      context: ./slot-service
    env_file:
      - .env
    restart: unless-stopped
    environment:
      PORT: 3100
      NODE_ENV: production
      DB_HOST: ${DB_HOST:?DB_HOST is required}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      SLOTOPOL_URL: http://slotopol:8080
      SLOTOPOL_CLUB_ID: ${SLOTOPOL_CLUB_ID:-1}
      SLOTOPOL_PLAYER_ID: ${SLOTOPOL_PLAYER_ID:-3}
      SLOTOPOL_ADMIN_EMAIL: ${SLOTOPOL_ADMIN_EMAIL:-admin@example.org}
      SLOTOPOL_ADMIN_SECRET: ${SLOTOPOL_ADMIN_SECRET:-0YBoaT}
      SLOTOPOL_PLAYER_EMAIL: ${SLOTOPOL_PLAYER_EMAIL:-player@example.org}
      SLOTOPOL_PLAYER_SECRET: ${SLOTOPOL_PLAYER_SECRET:-iVI05M}
      SLOTOPOL_GAME_ALIAS: ${SLOTOPOL_GAME_ALIAS:-CT Interactive/Lucky Dollar}
      SLOTOPOL_LINES: ${SLOTOPOL_LINES:-30}
    ports:
      - "${SLOT_API_PORT:-3100}:3100"
    depends_on:
      slotopol:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3100/health >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_POSTHOG_TOKEN: ${VITE_POSTHOG_TOKEN:-}
        VITE_POSTHOG_HOST: ${VITE_POSTHOG_HOST:-https://us.i.posthog.com}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_healthy
      slot-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
