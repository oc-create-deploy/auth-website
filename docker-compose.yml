services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: ${DB_HOST:-129.146.96.23}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-oc_casusdt}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_NAME: ${DB_NAME:-casusdt}
      JWT_SECRET: local-dev-secret-change-me
      CORS_ORIGIN: http://localhost:5173
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://casusdt.com}
      CLOAKD_API_URL: ${CLOAKD_API_URL:-}
      CLOAKD_PAYMENT_PATH: ${CLOAKD_PAYMENT_PATH:-/payment}
      CLOAKD_API_KEY: ${CLOAKD_API_KEY:-}
      CLOAKD_WEBHOOK_SECRET: ${CLOAKD_WEBHOOK_SECRET:-}
      ADMIN_EMAIL: admin@casusdt.com
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-this-before-deploy}
    ports:
      - "3000:3000"
  slotopol:
    image: schwarzlichtbezirk/slotopol:latest
    restart: unless-stopped
    ports:
      - "8080:8080"

  slot-api:
    build:
      context: ./slot-service
    restart: unless-stopped
    environment:
      PORT: 3100
      DB_HOST: ${DB_HOST:-129.146.96.23}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-oc_casusdt}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_NAME: ${DB_NAME:-casusdt}
      JWT_SECRET: local-dev-secret-change-me
      CORS_ORIGIN: http://localhost:5173
      SLOTOPOL_URL: http://slotopol:8080
    ports:
      - "3100:3100"
    depends_on:
      slotopol:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
      - slot-api
