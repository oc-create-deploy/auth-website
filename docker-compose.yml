services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root-password-change-me
      MYSQL_DATABASE: auth_app
      MYSQL_USER: auth_user
      MYSQL_PASSWORD: auth-password-change-me
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "auth_user", "-pauth-password-change-me"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: auth_user
      DB_PASSWORD: auth-password-change-me
      DB_NAME: auth_app
      JWT_SECRET: local-dev-secret-change-me
      CORS_ORIGIN: http://localhost:5173
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:5173}
      CLOAKD_API_URL: ${CLOAKD_API_URL:-}
      CLOAKD_API_KEY: ${CLOAKD_API_KEY:-}
      CLOAKD_WEBHOOK_SECRET: ${CLOAKD_WEBHOOK_SECRET:-}
      ADMIN_EMAIL: admin@casusdt.com
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-this-before-deploy}
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy

  slotopol:
    image: schwarzlichtbezirk/slotopol:latest
    restart: unless-stopped
    ports:
      - "8080:8080"

  slot-service:
    build:
      context: ./slot-service
    restart: unless-stopped
    environment:
      PORT: 3100
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: auth_user
      DB_PASSWORD: auth-password-change-me
      DB_NAME: auth_app
      JWT_SECRET: local-dev-secret-change-me
      CORS_ORIGIN: http://localhost:5173
      SLOTOPOL_URL: http://slotopol:8080
    ports:
      - "3100:3100"
    depends_on:
      mysql:
        condition: service_healthy
      slotopol:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
      - slot-service

volumes:
  mysql-data:
